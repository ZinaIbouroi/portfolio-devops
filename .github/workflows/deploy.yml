name: Deploy Portfolio

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '20'
  AWS_REGION: 'eu-west-3'

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }} --delete --cache-control "public, max-age=31536000, immutable" --exclude "*.html"
          aws s3 sync out/ s3://${{ secrets.S3_BUCKET }} --cache-control "no-cache, no-store, must-revalidate" --include "*.html" --exclude "*" --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

      - name: Done
        run: |
          echo "Deploiement reussi !" >> $GITHUB_STEP_SUMMARY
          echo "| Etape | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Next.js | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Upload S3 | OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Invalidation CloudFront | OK |" >> $GITHUB_STEP_SUMMARY